<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta property="og:description" content="ラオス1部リーグ＆FKサラエボ。東南アジアとヨーロッパ、2つのルートで海外プロ契約を目指せるトライアウト。2026年4月3日 水元スポーツセンターにて開催。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://zelos2026.github.io/soccer-tryout-2026/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="海外プロサッカー トライアウト 2026">
  <meta name="twitter:description" content="ラオス1部リーグ＆FKサラエボ。2026年4月3日 水元スポーツセンターにて開催。">
  <!-- General Meta -->
  <meta name="description" content="ラオス1部リーグ＆FKサラエボ。東南アジアとヨーロッパ、2つのルートで海外プロ契約を目指せるトライアウト。2026年4月3日開催。">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0a1628;
      --accent: #c8a94e;
      --accent-hover: #dbbe5e;
      --text: #f0f0f0;
      --text-muted: #a0a8b8;
      --card-bg: #111d33;
      --card-border: #1e2d47;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--primary);
      color: var(--text);
      line-height: 1.7;
    }

    /* ===== Navbar ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 99;
      background: rgba(10, 22, 40, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }

    .navbar.visible {
      transform: translateY(0);
    }

    .navbar-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.5rem;
    }

    .navbar-brand {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .navbar-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .navbar-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }

    .navbar-links a:hover {
      color: var(--accent);
    }

    /* ===== Language Toggle ===== */
    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      background: rgba(17, 29, 51, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      overflow: hidden;
      transition: top 0.4s ease;
    }

    .lang-toggle.with-navbar {
      top: 3.8rem;
    }

    .lang-toggle button {
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      letter-spacing: 0.05em;
    }

    .lang-toggle button.active {
      background: var(--accent);
      color: var(--primary);
    }

    .lang-toggle button:hover:not(.active) {
      color: var(--text);
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #0a1628 0%, #0f2240 40%, #162d50 60%, #0a1628 100%);
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(200, 169, 78, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(200, 169, 78, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 800px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(200, 169, 78, 0.15);
      border: 1px solid rgba(200, 169, 78, 0.3);
      color: var(--accent);
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .hero h1 .gold { color: var(--accent); }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .hero-date {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .hero-date span { color: var(--accent); }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-num {
      display: block;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: var(--primary);
      padding: 1rem 2.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(200, 169, 78, 0.25);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2s infinite;
    }

    .scroll-indicator svg {
      width: 28px;
      height: 28px;
      stroke: var(--text-muted);
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-8px); }
      60% { transform: translateX(-50%) translateY(-4px); }
    }

    /* ===== Section Common ===== */
    section { padding: 5rem 1.5rem; }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.6rem;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }

    .section-line {
      width: 50px;
      height: 3px;
      background: var(--accent);
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    /* ===== Scroll Animation ===== */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== About Section ===== */
    .about {
      background: linear-gradient(180deg, var(--primary) 0%, #0d1e35 100%);
    }

    .about-text {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 3rem;
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.9;
    }

    .highlight-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--accent);
      padding: 1.5rem 2rem;
      border-radius: 0 8px 8px 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .highlight-box p {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    /* ===== Details Section ===== */
    .details { background: #0d1e35; }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .detail-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .detail-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .detail-card h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .detail-card p { font-size: 1.15rem; font-weight: 700; }

    .detail-card .sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 0.3rem;
    }

    /* ===== Schedule Section ===== */
    .schedule {
      background: linear-gradient(180deg, #0d1e35 0%, var(--primary) 100%);
    }

    .timeline { max-width: 600px; margin: 0 auto; position: relative; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--card-border);
    }

    .timeline-item {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .timeline-time {
      min-width: 50px;
      text-align: right;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      padding-top: 0.1rem;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.35rem;
      position: relative;
      z-index: 1;
    }

    .timeline-content h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .timeline-content p { font-size: 0.9rem; color: var(--text-muted); }

    /* ===== Bring Section ===== */
    .bring { background: var(--primary); }

    .bring-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.2rem;
      max-width: 700px;
      margin: 0 auto;
    }

    .bring-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      text-align: center;
      font-weight: 600;
      font-size: 1rem;
    }

    /* ===== Map Section ===== */
    .map-section { background: #0d1e35; }

    .map-wrapper {
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--card-border);
      max-width: 800px;
      margin: 0 auto;
    }

    .map-wrapper iframe {
      width: 100%;
      height: 350px;
      border: 0;
    }

    /* ===== FAQ Section ===== */
    .faq { background: linear-gradient(180deg, #0d1e35 0%, var(--primary) 100%); }

    .faq-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .faq-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .faq-question {
      width: 100%;
      padding: 1.2rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color 0.3s;
    }

    .faq-question:hover { color: var(--accent); }

    .faq-question .arrow {
      font-size: 0.8rem;
      transition: transform 0.3s;
      color: var(--accent);
    }

    .faq-item.open .faq-question .arrow {
      transform: rotate(180deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }

    .faq-item.open .faq-answer {
      max-height: 200px;
    }

    .faq-answer-inner {
      padding: 0 1.5rem 1.2rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ===== Apply Section ===== */
    .apply { background: var(--primary); }

    .apply-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 3.5rem 2.5rem;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    .apply-lead {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.9;
      margin-bottom: 2rem;
    }

    .btn-apply { padding: 1.1rem 3rem; font-size: 1.1rem; }

    .apply-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1.2rem;
      opacity: 0.7;
    }

    /* ===== SNS Share ===== */
    .share-section {
      background: #0d1e35;
      padding: 3rem 1.5rem;
    }

    .share-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s ease;
      border: 1px solid var(--card-border);
    }

    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .share-btn.x { background: #000; color: #fff; }
    .share-btn.line { background: #06C755; color: #fff; border-color: #06C755; }
    .share-btn.facebook { background: #1877F2; color: #fff; border-color: #1877F2; }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 2.5rem 1.5rem;
      border-top: 1px solid var(--card-border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      section { padding: 3.5rem 1.2rem; }
      .apply-box { padding: 2.5rem 1.5rem; }
      .details-grid { grid-template-columns: 1fr; }
      .timeline-item { gap: 1rem; }
      .countdown { gap: 0.8rem; }
      .bring-grid { grid-template-columns: 1fr 1fr; }

      .lang-toggle { top: 0.8rem; right: 0.8rem; }
      .lang-toggle.with-navbar { top: 3.5rem; }
      .lang-toggle button { padding: 0.4rem 0.7rem; font-size: 0.75rem; }

      .navbar-links { gap: 0.8rem; }
      .navbar-links a { font-size: 0.7rem; }
      .navbar-brand { font-size: 0.75rem; }
    }
  </style>
</head>

  <script>
    // ===== Language Switch =====
    let currentLang = 'ja';
    const langs = ['ja', 'en', 'lo'];
    const titles = {
      ja: '海外プロサッカー トライアウト 2026 | 東南アジア＆ヨーロッパ | 4月3日開催',
      en: 'International Pro Football Tryout 2026 | Southeast Asia & Europe | April 3',
      lo: 'ທົດສອບຟຸດບານອາຊີບ 2026 | ອາຊີຕາເວັນອອກສຽງໃຕ້ ແລະ ຢູໂຣບ | 3 ເມສາ'
    };

    function switchLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      langs.forEach(l => {
        document.getElementById('btn-' + l).classList.toggle('active', l === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.hasAttribute('data-ja') && el.hasAttribute('data-en') && el.hasAttribute('data-lo')) {
          el.innerHTML = el.getAttribute('data-' + lang);
        }
      });
      document.title = titles[lang];
    }

    switchLang('ja');

    // ===== Countdown Timer =====
    const eventDate = new Date('2026-04-03T11:30:00+09:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = eventDate - now;

      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('cd-days').textContent = days;
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
      document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ===== Navbar show on scroll =====
    const navbar = document.getElementById('navbar');
    const langToggle = document.getElementById('langToggle');
    let lastScroll = 0;

    window.addEventListener('scroll', () => {
      const heroHeight = document.querySelector('.hero').offsetHeight;
      if (window.scrollY > heroHeight * 0.7) {
        navbar.classList.add('visible');
        langToggle.classList.add('with-navbar');
      } else {
        navbar.classList.remove('visible');
        langToggle.classList.remove('with-navbar');
      }
    });

    // ===== Scroll Animation =====
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // ===== FAQ Toggle =====
    function toggleFaq(btn) {
      const item = btn.closest('.faq-item');
      item.classList.toggle('open');
    }
  </script>
