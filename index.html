<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海外プロサッカー トライアウト 2026 | 東南アジア＆ヨーロッパ | 4月3日開催</title>

  <!-- Favicon (SVG soccer ball) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='30' fill='%230a1628' stroke='%23c8a94e' stroke-width='3'/><polygon points='32,10 38,20 32,26 26,20' fill='%23c8a94e'/><polygon points='50,24 48,34 40,34 38,26' fill='%23c8a94e'/><polygon points='14,24 16,34 24,34 26,26' fill='%23c8a94e'/><polygon points='20,46 28,42 32,50 24,52' fill='%23c8a94e'/><polygon points='44,46 36,42 32,50 40,52' fill='%23c8a94e'/></svg>" type="image/svg+xml">

  <!-- OGP Meta Tags -->
  <meta property="og:title" content="海外プロサッカー トライアウト 2026">
  <meta property="og:description" content="ラオス1部リーグ＆FKサラエボ。東南アジアとヨーロッパ、2つのルートで海外プロ契約を目指せるトライアウト。2026年4月3日 水元スポーツセンターにて開催。">
  <meta property="og:type" content="website">

  <meta property="og:locale" content="ja_JP">
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="海外プロサッカー トライアウト 2026">
  <meta name="twitter:description" content="ラオス1部リーグ＆FKサラエボ。2026年4月3日 水元スポーツセンターにて開催。">
  <!-- General Meta -->
  <meta name="description" content="ラオス1部リーグ＆FKサラエボ。東南アジアとヨーロッパ、2つのルートで海外プロ契約を目指せるトライアウト。2026年4月3日開催。">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0a1628;
      --accent: #c8a94e;
      --accent-hover: #dbbe5e;
      --text: #f0f0f0;
      --text-muted: #a0a8b8;
      --card-bg: #111d33;
      --card-border: #1e2d47;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background-color: var(--primary);
      color: var(--text);
      line-height: 1.7;
    }

    /* ===== Page Loader ===== */
    .page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1.5rem;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }

    .page-loader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-icon {
      width: 50px;
      height: 50px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: loaderSpin 0.8s linear infinite;
    }

    .loader-text {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    @keyframes loaderSpin {
      to { transform: rotate(360deg); }
    }

    /* ===== Navbar ===== */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 99;
      background: rgba(10, 22, 40, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      transform: translateY(-100%);
      transition: transform 0.4s ease;
    }

    .navbar.visible {
      transform: translateY(0);
    }

    .navbar-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1.5rem;
    }

    .navbar-brand {
      font-size: 0.85rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .navbar-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }

    .navbar-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }

    .navbar-links a:hover {
      color: var(--accent);
    }

    /* ===== Language Toggle ===== */
    .lang-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      z-index: 100;
      display: flex;
      background: rgba(17, 29, 51, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 50px;
      overflow: hidden;
      transition: top 0.4s ease;
    }

    .lang-toggle.with-navbar {
      top: 3.8rem;
    }

    .lang-toggle button {
      padding: 0.45rem 0.9rem;
      font-size: 0.8rem;
      font-weight: 700;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      letter-spacing: 0.05em;
    }

    .lang-toggle button.active {
      background: var(--accent);
      color: var(--primary);
    }

    .lang-toggle button:hover:not(.active) {
      color: var(--text);
    }

    /* ===== Hero Section ===== */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: linear-gradient(135deg, #0a1628 0%, #0f2240 25%, #162d50 50%, #0f2240 75%, #0a1628 100%);
      background-size: 400% 400%;
      animation: heroGradient 12s ease infinite;
      overflow: hidden;
    }

    @keyframes heroGradient {
      0% { background-position: 0% 50%; }
      25% { background-position: 100% 25%; }
      50% { background-position: 100% 50%; }
      75% { background-position: 0% 75%; }
      100% { background-position: 0% 50%; }
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(200, 169, 78, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(200, 169, 78, 0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      padding: 2rem;
      max-width: 800px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(200, 169, 78, 0.15);
      border: 1px solid rgba(200, 169, 78, 0.3);
      color: var(--accent);
      padding: 0.4rem 1.2rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .hero h1 .gold { color: var(--accent); }

    .hero-subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-weight: 400;
    }

    .hero-date {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .hero-date span { color: var(--accent); }

    /* Countdown */
    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 2.5rem;
    }

    .countdown-item {
      text-align: center;
    }

    .countdown-num {
      display: block;
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.3rem;
    }

    .btn-primary {
      display: inline-block;
      background: var(--accent);
      color: var(--primary);
      padding: 1rem 2.5rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.05rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(200, 169, 78, 0.25);
    }

    .scroll-indicator {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      animation: bounce 2s infinite;
    }

    .scroll-indicator svg {
      width: 28px;
      height: 28px;
      stroke: var(--text-muted);
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-8px); }
      60% { transform: translateX(-50%) translateY(-4px); }
    }

    /* ===== Wave Divider ===== */
    .wave-divider {
      position: relative;
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin-top: -1px;
    }

    .wave-divider svg {
      display: block;
      width: 100%;
      height: 60px;
    }

    .wave-divider.flip {
      transform: rotate(180deg);
      margin-top: 0;
      margin-bottom: -1px;
    }

    /* ===== Section Common ===== */
    section { padding: 5rem 1.5rem; }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 1.8rem;
      font-weight: 800;
      text-align: center;
      margin-bottom: 0.6rem;
    }

    .section-subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 3rem;
      font-size: 0.95rem;
    }

    .section-line {
      width: 50px;
      height: 3px;
      background: var(--accent);
      margin: 0 auto 3rem;
      border-radius: 2px;
    }

    /* ===== Scroll Animation ===== */
    .fade-in {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Stagger Animation for Cards */
    .stagger-item {
      opacity: 0;
      transform: translateY(25px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .stagger-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== About Section ===== */
    .about {
      background: linear-gradient(180deg, var(--primary) 0%, #0d1e35 100%);
    }

    .about-text {
      text-align: center;
      max-width: 700px;
      margin: 0 auto 3rem;
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.9;
    }

    .highlight-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--accent);
      padding: 1.5rem 2rem;
      border-radius: 0 8px 8px 0;
      max-width: 600px;
      margin: 0 auto;
    }

    .highlight-box p {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    /* ===== Stats Section ===== */
    .stats {
      background: #0d1e35;
      padding: 4rem 1.5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .stat-item {
      text-align: center;
      padding: 1.5rem 0.5rem;
    }

    .stat-number {
      font-size: clamp(2rem, 5vw, 2.8rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .stat-number .stat-suffix {
      font-size: 0.6em;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* ===== Details Section ===== */
    .details { background: #0d1e35; }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .detail-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 2rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .detail-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .detail-card h3 {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }

    .detail-card p { font-size: 1.15rem; font-weight: 700; }

    .detail-card .sub {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 0.3rem;
    }

    /* ===== Schedule Section ===== */
    .schedule {
      background: linear-gradient(180deg, #0d1e35 0%, var(--primary) 100%);
    }

    .timeline { max-width: 600px; margin: 0 auto; position: relative; }

    .timeline::before {
      content: '';
      position: absolute;
      left: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--card-border);
    }

    .timeline-item {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .timeline-time {
      min-width: 50px;
      text-align: right;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      padding-top: 0.1rem;
    }

    .timeline-dot {
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 0.35rem;
      position: relative;
      z-index: 1;
    }

    .timeline-content h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 0.2rem; }
    .timeline-content p { font-size: 0.9rem; color: var(--text-muted); }

    /* ===== FAQ Section ===== */
    .faq { background: linear-gradient(180deg, #0d1e35 0%, var(--primary) 100%); }

    .faq-list {
      max-width: 700px;
      margin: 0 auto;
    }

    .faq-item {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }

    .faq-question {
      width: 100%;
      padding: 1.2rem 1.5rem;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: color 0.3s;
    }

    .faq-question:hover { color: var(--accent); }

    .faq-question .arrow {
      font-size: 0.8rem;
      transition: transform 0.3s;
      color: var(--accent);
    }

    .faq-item.open .faq-question .arrow {
      transform: rotate(180deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.4s ease;
    }

    .faq-item.open .faq-answer {
      max-height: 200px;
    }

    .faq-answer-inner {
      padding: 0 1.5rem 1.2rem;
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.8;
    }

    /* ===== Apply Section ===== */
    .apply { background: var(--primary); }

    .apply-box {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 3.5rem 2.5rem;
      max-width: 560px;
      margin: 0 auto;
      text-align: center;
    }

    .apply-lead {
      font-size: 1.05rem;
      color: var(--text-muted);
      line-height: 1.9;
      margin-bottom: 2rem;
    }

    .btn-apply { padding: 1.1rem 3rem; font-size: 1.1rem; }

    .apply-note {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 1.2rem;
      opacity: 0.7;
    }

    /* ===== SNS Share ===== */
    .share-section {
      background: #0d1e35;
      padding: 3rem 1.5rem;
    }

    .share-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .share-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      border-radius: 50px;
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s ease;
      border: 1px solid var(--card-border);
    }

    .share-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .share-btn.x { background: #000; color: #fff; }
    .share-btn.line { background: #06C755; color: #fff; border-color: #06C755; }
    .share-btn.facebook { background: #1877F2; color: #fff; border-color: #1877F2; }

    /* ===== Back to Top Button ===== */
    .back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 90;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transform: translateY(10px);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(200, 169, 78, 0.3);
    }

    .back-to-top.visible {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .back-to-top:hover {
      background: var(--accent-hover);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(200, 169, 78, 0.4);
    }

    .back-to-top svg {
      width: 22px;
      height: 22px;
    }

    /* ===== Mobile Floating CTA ===== */
    .mobile-cta {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 95;
      background: rgba(10, 22, 40, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--card-border);
      padding: 0.8rem 1.2rem;
      transform: translateY(100%);
      transition: transform 0.4s ease;
    }

    .mobile-cta.visible {
      transform: translateY(0);
    }

    .mobile-cta a {
      display: block;
      background: var(--accent);
      color: var(--primary);
      text-align: center;
      padding: 0.9rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }

    .mobile-cta a:active {
      background: var(--accent-hover);
    }

    /* ===== Footer ===== */
    footer {
      text-align: center;
      padding: 2.5rem 1.5rem;
      border-top: 1px solid var(--card-border);
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    /* ===== Responsive ===== */
    @media (max-width: 600px) {
      section { padding: 3.5rem 1.2rem; }
      .apply-box { padding: 2.5rem 1.5rem; }
      .details-grid { grid-template-columns: 1fr; }
      .timeline-item { gap: 1rem; }
      .countdown { gap: 0.8rem; }
      .lang-toggle { top: 0.8rem; right: 0.8rem; }
      .lang-toggle.with-navbar { top: 3.5rem; }
      .lang-toggle button { padding: 0.4rem 0.7rem; font-size: 0.75rem; }

      .navbar-links { gap: 0.8rem; }
      .navbar-links a { font-size: 0.7rem; }
      .navbar-brand { font-size: 0.75rem; }

      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
      .stat-item { padding: 1rem 0.5rem; }

      .wave-divider svg { height: 35px; }

      .back-to-top { bottom: 5rem; right: 1rem; width: 42px; height: 42px; }

      .mobile-cta { display: block; }

      footer { padding-bottom: 5rem; }
    }
  </style>
</head>
<body>

  <!-- ===== Page Loader ===== -->
  <div class="page-loader" id="pageLoader">
    <div class="loader-icon"></div>
    <div class="loader-text">LOADING</div>
  </div>

  <!-- ===== Navbar ===== -->
  <nav class="navbar" id="navbar">
    <div class="navbar-inner">
      <div class="navbar-brand">TRYOUT 2026</div>
      <ul class="navbar-links">
        <li><a href="#about">ABOUT</a></li>
        <li><a href="#details">DETAILS</a></li>
        <li><a href="#schedule">SCHEDULE</a></li>
        <li><a href="#apply">ENTRY</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== Language Toggle ===== -->
  <div class="lang-toggle" id="langToggle">
    <button id="btn-ja" class="active" onclick="switchLang('ja')">JP</button>
    <button id="btn-en" onclick="switchLang('en')">EN</button>
    <button id="btn-lo" onclick="switchLang('lo')">LO</button>
  </div>

  <!-- ===== Hero ===== -->
  <section class="hero" id="hero">
    <div class="hero-content">
      <div class="hero-badge">Official Tryout 2026</div>
      <h1

      <div class="share-buttons">
        <a class="share-btn x" href="https://twitter.com/intent/tweet?url=https%3A%2F%2Fzelos2026.github.io%2Fsoccer-tryout-2026%2F&text=%E6%B5%B7%E5%A4%96%E3%83%97%E3%83%AD%E3%82%B5%E3%83%83%E3%82%AB%E3%83%BC+%E3%83%88%E3%83%A9%E3%82%A4%E3%82%A2%E3%82%A6%E3%83%88+2026" target="_blank" rel="noopener">𝕏 Post</a>
        <a class="share-btn line" href="https://social-plugins.line.me/lineit/share?url=https%3A%2F%2Fzelos2026.github.io%2Fsoccer-tryout-2026%2F" target="_blank" rel="noopener">LINE</a>
        <a class="share-btn facebook" href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fzelos2026.github.io%2Fsoccer-tryout-2026%2F" target="_blank" rel="noopener">Facebook</a>
      </div>

  </section>

  <!-- ===== Footer ===== -->
  <footer>
    <p
      data-ja="&copy; 2026 株式会社ZELOS 海外プロサッカートライアウトプロジェクトチーム. All rights reserved."
      data-en="&copy; 2026 ZELOS Inc. International Pro Football Tryout Project Team. All rights reserved."
      data-lo="&copy; 2026 ZELOS Inc. ທີມງານໂຄງການທົດສອບຟຸດບານອາຊີບສາກົນ. ສະຫງວນລິຂະສິດ."
    ></p>
  </footer>

  <!-- ===== Back to Top Button ===== -->
  <button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="18 15 12 9 6 15"></polyline>
    </svg>
  </button>

  <!-- ===== Mobile Floating CTA ===== -->
  <div class="mobile-cta" id="mobileCta">
    <a href="https://form.run/@taqmau-sWv6tqPIdsUisJaRMIvn" target="_blank" rel="noopener"
      data-ja="参加申込みはこちら" data-en="Apply Now" data-lo="ສະໝັກດຽວນີ້"
    ></a>
  </div>

  <script>
    // ===== Page Loader =====
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('pageLoader').classList.add('hidden');
      }, 600);
    });

    // ===== Language Switch =====
    let currentLang = 'ja';
    const langs = ['ja', 'en', 'lo'];
    const titles = {
      ja: '海外プロサッカー トライアウト 2026 | 東南アジア＆ヨーロッパ | 4月3日開催',
      en: 'International Pro Football Tryout 2026 | Southeast Asia & Europe | April 3',
      lo: 'ທົດສອບຟຸດບານອາຊີບ 2026 | ອາຊີຕາເວັນອອກສຽງໃຕ້ ແລະ ຢູໂຣບ | 3 ເມສາ'
    };

    function switchLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;
      langs.forEach(l => {
        document.getElementById('btn-' + l).classList.toggle('active', l === lang);
      });
      document.querySelectorAll('[data-' + lang + ']').forEach(el => {
        if (el.hasAttribute('data-ja') && el.hasAttribute('data-en') && el.hasAttribute('data-lo')) {
          el.innerHTML = el.getAttribute('data-' + lang);
        }
      });
      document.title = titles[lang];
    }

    switchLang('ja');

    // ===== Countdown Timer =====
    const eventDate = new Date('2026-04-03T11:30:00+09:00').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = eventDate - now;

      if (diff <= 0) {
        document.getElementById('countdown').style.display = 'none';
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const secs = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('cd-days').textContent = days;
      document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('cd-mins').textContent = String(mins).padStart(2, '0');
      document.getElementById('cd-secs').textContent = String(secs).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // ===== Navbar & Back to Top & Mobile CTA on scroll =====
    const navbar = document.getElementById('navbar');
    const langToggle = document.getElementById('langToggle');
    const backToTop = document.getElementById('backToTop');
    const mobileCta = document.getElementById('mobileCta');

    window.addEventListener('scroll', () => {
      const heroHeight = document.querySelector('.hero').offsetHeight;
      const scrollY = window.scrollY;

      // Navbar
      if (scrollY > heroHeight * 0.7) {
        navbar.classList.add('visible');
        langToggle.classList.add('with-navbar');
      } else {
        navbar.classList.remove('visible');
        langToggle.classList.remove('with-navbar');
      }

      // Back to Top button
      if (scrollY > 600) {
        backToTop.classList.add('visible');
      } else {
        backToTop.classList.remove('visible');
      }

      // Mobile CTA
      if (scrollY > heroHeight && scrollY < document.body.scrollHeight - window.innerHeight - 200) {
        mobileCta.classList.add('visible');
      } else {
        mobileCta.classList.remove('visible');
      }
    });

    // ===== Scroll Animation (fade-in) =====
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.15 });

    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    // ===== Stagger Animation =====
    const staggerObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const parent = entry.target.closest('.details-grid, .timeline');
          if (parent) {
            const items = parent.querySelectorAll('.stagger-item');
            items.forEach((item, i) => {
              setTimeout(() => {
                item.classList.add('visible');
              }, i * 100);
            });
          }
          staggerObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1 });

    // Observe only the first stagger-item in each group
    document.querySelectorAll('.details-grid, .timeline').forEach(group => {
      const first = group.querySelector('.stagger-item');
      if (first) staggerObserver.observe(first);
    });

    // ===== Stats Counter Animation =====
    const statsObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const counters = entry.target.querySelectorAll('.stat-count');
          counters.forEach(counter => {
            const target = parseInt(counter.getAttribute('data-target'));
            const duration = 1500;
            const startTime = performance.now();

            function animate(currentTime) {
              const elapsed = currentTime - startTime;
              const progress = Math.min(elapsed / duration, 1);
              const eased = 1 - Math.pow(1 - progress, 3);
              const current = Math.floor(eased * target);
              counter.textContent = target >= 1000 ? current.toLocaleString() : current;
              if (progress < 1) {
                requestAnimationFrame(animate);
              } else {
                counter.textContent = target >= 1000 ? target.toLocaleString() : target;
              }
            }

            requestAnimationFrame(animate);
          });
          statsObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    const statsGrid = document.querySelector('.stats-grid');
    if (statsGrid) statsObserver.observe(statsGrid);

    // ===== FAQ Toggle =====
    function toggleFaq(btn) {
      const item = btn.closest('.faq-item');
      item.classList.toggle('open');
    }
  </script>

</body>
